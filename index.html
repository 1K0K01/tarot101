<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MYSTIC TAROT</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&family=JetBrains+Mono&display=swap" rel="stylesheet" />

  <style>
    :root { --accent: #d4764e; --obsidian: #050508; }
    body { background-color: var(--obsidian); color: #e0c0b0; font-family: 'Noto Sans KR', sans-serif; scroll-behavior: smooth; }
    .font-display { font-family: 'Cinzel', serif; }
    .glass { background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(212, 118, 78, 0.15); }
    .input-field { background: #050508; border: 1px solid rgba(212, 118, 78, 0.3); color: #fff; border-radius: 4px; padding: 12px; transition: 0.3s; }
    .input-field:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 10px rgba(212, 118, 78, 0.1); }
    
    /* 카드 디자인 */
    .card-container { perspective: 1000px; width: 140px; height: 240px; }
    .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
    .card-inner.flipped { transform: rotateY(180deg); }
    .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 8px; border: 1px solid rgba(212, 118, 78, 0.3); overflow: hidden; }
    .card-back { background: #1a1a26; background-size: cover; background-position: center; }
    .card-front { transform: rotateY(180deg); background-size: cover; background-position: center; background-color: #0a0a0f; }

    .btn-primary { background: linear-gradient(135deg, #d4764e, #8e4a2d); color: white; font-weight: 700; transition: 0.3s; cursor: pointer; border-radius: 6px; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <header class="p-6 flex justify-between items-center border-b border-white/5 sticky top-0 bg-obsidian/95 z-50 backdrop-blur-md">
    <div class="flex items-center gap-4">
      <div class="w-8 h-8 border border-accent rotate-45 flex items-center justify-center">
        <span class="rotate-[-45deg] text-accent font-display font-bold text-xs">M</span>
      </div>
      <h1 class="text-lg font-display font-bold tracking-[0.3em] text-accent uppercase">Mystic Tarot AI</h1>
    </div>
    
    <div class="flex items-center gap-6">
      <div class="text-right">
        <span class="text-[9px] uppercase tracking-widest text-gray-500 block mb-1">Active Oracle</span>
        <select id="active-oracle-select" class="bg-transparent border-none text-accent font-mono text-xs focus:ring-0 cursor-pointer p-0"></select>
      </div>
      <button id="settings-btn" class="p-2 hover:bg-white/5 rounded-full text-accent transition">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
      </button>
    </div>
  </header>

  <main class="flex-1 max-w-4xl mx-auto p-6 w-full space-y-12">
    <section class="w-full glass p-10 rounded-3xl mt-10 shadow-2xl relative overflow-hidden">
        <div class="relative z-10">
          <div class="flex justify-between items-center mb-6">
            <label class="text-[10px] font-bold uppercase tracking-[0.3em] text-accent">The Gate of Fate</label>
            <select id="active-deck-selector" class="bg-transparent border-none text-[10px] text-gray-500 uppercase font-bold tracking-widest focus:ring-0"></select>
          </div>
          <textarea id="user-question" rows="4" class="input-field w-full text-lg mb-8 bg-obsidian/50" placeholder="당신의 고민을 명확하게 적어주세요..."></textarea>
          <button onclick="startReading()" class="btn-primary w-full py-5 text-xl font-display tracking-[0.4em] uppercase">Invoke Oracle</button>
        </div>
    </section>

    <div id="result-area" class="hidden space-y-12 pb-32">
        <div id="card-display" class="flex justify-center gap-6 flex-wrap"></div>
        <div class="glass p-12 rounded-3xl border-white/5 relative">
            <div class="absolute top-[-14px] left-1/2 translate-x-[-50%] px-6 py-1 bg-obsidian border border-accent rounded-full text-[9px] font-display text-accent tracking-widest uppercase">The Revelation</div>
            <div id="ai-response" class="prose prose-invert max-w-none text-gray-300 leading-relaxed"></div>
        </div>
    </div>
  </main>

  <div id="settings-modal" class="fixed inset-0 bg-black/95 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-md">
    <div class="glass w-full max-w-2xl rounded-3xl p-10 max-h-[85vh] overflow-hidden flex flex-col shadow-2xl border-accent/20">
      <div class="flex justify-between items-center mb-10">
        <h2 class="text-xl font-display font-bold text-accent tracking-widest uppercase">Archive Configuration</h2>
        <button id="close-settings" class="text-gray-500 hover:text-white transition text-2xl">✕</button>
      </div>

      <div class="flex gap-8 mb-8 border-b border-white/5 font-display text-[11px] tracking-[0.2em] uppercase font-bold">
        <button class="tab-btn pb-4 border-b-2 border-accent text-accent" data-tab="tab-ai">AI Models</button>
        <button class="tab-btn pb-4 border-b-2 border-transparent text-gray-600" data-tab="tab-deck">Decks</button>
        <button class="tab-btn pb-4 border-b-2 border-transparent text-gray-600" data-tab="tab-persona">Persona</button>
      </div>

      <div id="tab-ai" class="tab-content space-y-6 overflow-y-auto pr-2">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-3 p-6 bg-white/5 rounded-2xl border border-white/5">
            <select id="new-prov" class="input-field text-xs uppercase col-span-1">
                <option value="groq">Groq</option>
                <option value="openai">OpenAI</option>
                <option value="google">Google</option>
            </select>
            <input type="text" id="new-model-id" class="input-field text-xs font-mono col-span-2" placeholder="Model (e.g. llama-3.1-70b-versatile)">
            <button onclick="addOracle()" class="btn-primary text-[10px] font-bold uppercase tracking-widest">Add</button>
        </div>
        <div id="model-list" class="space-y-3"></div>
      </div>

      <div id="tab-deck" class="tab-content hidden space-y-6 overflow-y-auto pr-2">
        <div class="space-y-4 p-6 bg-obsidian rounded-2xl border border-white/5">
            <input type="text" id="deck-name" class="input-field w-full text-sm" placeholder="New Deck Name">
            <input type="file" id="deck-files" multiple class="text-xs text-gray-500 block w-full">
            <button onclick="saveCustomDeck()" class="btn-primary w-full py-3 text-[10px] uppercase tracking-widest">Register Library</button>
        </div>
        <div id="deck-list-ui" class="space-y-2"></div>
      </div>

      <div id="tab-persona" class="tab-content hidden space-y-6">
        <div class="p-6 bg-obsidian rounded-2xl border border-white/5">
            <label class="block text-[10px] text-accent uppercase tracking-widest mb-4">Oracle Persona</label>
            <textarea id="persona-prompt" rows="6" class="input-field w-full text-sm" placeholder="예: 구한말 시대의 무당처럼 말해줘."></textarea>
        </div>
      </div>

      <div class="mt-auto pt-8">
        <button id="save-all-settings" class="btn-primary w-full py-4 text-xs font-display tracking-[0.2em] uppercase">Commit Changes</button>
      </div>
    </div>
  </div>

  <div id="oracle-loader" class="fixed inset-0 bg-black/90 hidden z-[200] flex flex-col items-center justify-center">
    <div class="w-12 h-12 border-2 border-accent border-t-transparent rounded-full animate-spin mb-6"></div>
    <p class="font-display text-accent animate-pulse tracking-[0.5em] text-xs">Consulting the Akashic Records</p>
  </div>

  <script>
    const MASTER_PROMPT = `당신은 최고 수준의 타로 마스터입니다. 상황 요약, 스프레드 명칭, 카드별 상세 상징 해석(위치와 연동), 최종 조언 순으로 풍부하게 답변하십시오. 전문 용어를 섞어 신비로운 분위기를 유지하세요.`;
    
    let db;
    let config = JSON.parse(localStorage.getItem('mystic_cfg_v5')) || { models: [], activeIdx: 0, persona: "", activeDeck: "none" };

    const init = async () => {
        const req = indexedDB.open("MysticV5DB", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("decks", { keyPath: "name" });
        req.onsuccess = e => { db = e.target.result; renderDeckUI(); };
        renderModelUI();
    };

    // --- 모델 기능 ---
    function addOracle() {
        const prov = document.getElementById('new-prov').value;
        const mid = document.getElementById('new-model-id').value;
        if(!mid) return alert("모델명을 입력하세요.");
        const key = prompt(`${prov.toUpperCase()} API KEY를 입력하세요:`);
        if(!key) return;
        config.models.push({ prov, mid, key });
        renderModelUI();
    }

    function renderModelUI() {
        const list = document.getElementById('model-list');
        const select = document.getElementById('active-oracle-select');
        list.innerHTML = ''; select.innerHTML = '';

        config.models.forEach((m, i) => {
            const div = document.createElement('div');
            div.className = "flex justify-between items-center p-4 bg-white/5 rounded-xl border border-white/5 text-[11px]";
            div.innerHTML = `<div><span class="text-accent font-bold uppercase mr-2">${m.prov}</span><span class="font-mono opacity-60">${m.mid}</span></div>
                             <button onclick="removeOracle(${i})" class="text-red-900 font-bold uppercase hover:text-red-500 transition">Purge</button>`;
            list.appendChild(div);

            const opt = document.createElement('option');
            opt.value = i; opt.textContent = `[${m.prov.toUpperCase()}] ${m.mid}`;
            if(config.activeIdx == i) opt.selected = true;
            select.appendChild(opt);
        });
    }

    function removeOracle(i) { if(confirm("삭제하시겠습니까?")) { config.models.splice(i, 1); renderModelUI(); } }

    // --- 리딩 엔진 ---
    async function startReading() {
        const q = document.getElementById('user-question').value;
        if(!q) return alert("고민을 입력하세요.");
        if(config.models.length === 0) return alert("모델을 먼저 등록하세요.");

        const loader = document.getElementById('oracle-loader');
        const resArea = document.getElementById('result-area');
        const resDiv = document.getElementById('ai-response');
        
        loader.classList.remove('hidden');
        resArea.classList.remove('hidden');
        resDiv.innerHTML = "";
        window.scrollTo({ top: resArea.offsetTop - 50, behavior: 'smooth' });

        const cards = [Math.floor(Math.random()*78), Math.floor(Math.random()*78), Math.floor(Math.random()*78)];
        await renderCards(cards);

        try {
            const m = config.models[config.activeIdx];
            const sys = `${MASTER_PROMPT}\n\n[Persona]: ${config.persona}`;
            const usr = `질문: ${q}\n카드: ${cards.join(', ')} (순서: 과거, 현재, 미래)`;
            
            const result = await fetchOracle(m, sys, usr);
            resDiv.innerHTML = marked.parse(result);
        } catch(e) {
            resDiv.innerHTML = `<p class="text-red-500">연결 실패: ${e.message}</p>`;
        } finally {
            loader.classList.add('hidden');
        }
    }

    async function fetchOracle(m, sys, usr) {
        let url, headers = { "Content-Type": "application/json" };
        let body;

        if(m.prov === 'groq') {
            url = "https://api.groq.com/openai/v1/chat/completions";
            headers["Authorization"] = `Bearer ${m.key}`;
            body = { model: m.mid, messages: [{role:"system", content:sys}, {role:"user", content:usr}] };
        } else if(m.prov === 'openai') {
            url = "https://api.openai.com/v1/chat/completions";
            headers["Authorization"] = `Bearer ${m.key}`;
            body = { model: m.mid, messages: [{role:"system", content:sys}, {role:"user", content:usr}] };
        } else if(m.prov === 'google') {
            url = `https://generativelanguage.googleapis.com/v1beta/models/${m.mid}:generateContent?key=${m.key}`;
            body = { contents: [{ parts: [{ text: sys + "\n\n" + usr }] }] };
        }

        const res = await fetch(url, { method: "POST", headers, body: JSON.stringify(body) });
        const data = await res.json();
        
        if(m.prov === 'google') return data.candidates[0].content.parts[0].text;
        return data.choices[0].message.content;
    }

    // --- 카드 시각화 및 기타 ---
    async function renderCards(ids) {
        const display = document.getElementById('card-display');
        display.innerHTML = '';
        let deck = null;
        if(config.activeDeck !== 'none') {
            deck = await new Promise(res => db.transaction("decks").objectStore("decks").get(config.activeDeck).onsuccess = e => res(e.target.result));
        }

        ids.forEach((id, i) => {
            const container = document.createElement('div');
            container.className = 'card-container';
            const fSrc = deck?.images[`${id}.jpg`] || deck?.images[`${id}.png`] || '';
            const bSrc = deck?.images[`back.jpg`] || deck?.images[`back.png`] || '';
            
            container.innerHTML = `<div class="card-inner" id="ci-${i}">
                <div class="card-back" style="background-image:url('${bSrc}')"></div>
                <div class="card-front" style="background-image:url('${fSrc}')">${!fSrc ? id : ''}</div>
            </div>`;
            display.appendChild(container);
            setTimeout(() => document.getElementById(`ci-${i}`).classList.add('flipped'), 300 + (i*400));
        });
    }

    // --- 설정 보존 및 UI 제어 ---
    document.getElementById('settings-btn').onclick = () => {
        document.getElementById('persona-prompt').value = config.persona;
        document.getElementById('settings-modal').classList.remove('hidden');
    };
    document.getElementById('close-settings').onclick = () => document.getElementById('settings-modal').classList.add('hidden');
    document.getElementById('save-all-settings').onclick = () => {
        config.persona = document.getElementById('persona-prompt').value;
        config.activeIdx = document.getElementById('active-oracle-select').value;
        config.activeDeck = document.getElementById('active-deck-selector').value;
        localStorage.setItem('mystic_cfg_v5', JSON.stringify(config));
        location.reload();
    };

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.className = "tab-btn pb-4 border-b-2 border-transparent text-gray-600");
            btn.className = "tab-btn pb-4 border-b-2 border-accent text-accent";
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(btn.dataset.tab).classList.remove('hidden');
        };
    });

    async function saveCustomDeck() {
        const name = document.getElementById('deck-name').value;
        const files = document.getElementById('deck-files').files;
        if(!name || files.length < 1) return alert("정보가 부족합니다.");
        const images = {};
        for(let f of files) images[f.name] = await new Promise(r => { const rd = new FileReader(); rd.onload = e => r(e.target.result); rd.readAsDataURL(f); });
        db.transaction("decks", "readwrite").objectStore("decks").put({ name, images });
        alert("등록 완료"); renderDeckUI();
    }

    async function renderDeckUI() {
        const list = await new Promise(res => db.transaction("decks").objectStore("decks").getAll().onsuccess = e => res(e.target.result));
        const sel = document.getElementById('active-deck-selector');
        const ui = document.getElementById('deck-list-ui');
        sel.innerHTML = '<option value="none">Text Only</option>'; ui.innerHTML = '';
        list.forEach(d => {
            const opt = document.createElement('option'); opt.value = d.name; opt.textContent = d.name;
            if(config.activeDeck === d.name) opt.selected = true;
            sel.appendChild(opt);
            const div = document.createElement('div'); div.className = "flex justify-between p-3 bg-white/5 rounded text-xs";
            div.innerHTML = `<span>${d.name}</span><button onclick="deleteDeck('${d.name}')" class="text-red-900">Purge</button>`;
            ui.appendChild(div);
        });
    }

    init();
  </script>
</body>
</html>
